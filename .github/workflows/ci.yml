name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias (pyproject + extra dev)
        run: uv sync --extra dev
      - name: Tests del backend (suite completa)
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit

  docker:
    # Valida que la imagen del backend construya (sin publicarla).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build imagen backend
        run: docker build -f Dockerfile.backend -t agente-rh-backend:ci .

  k8s-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar manifests (kubeconform)
        run: |
          kubectl kustomize deploy/k8s/ > /tmp/rendered.yaml
          docker run --rm -i ghcr.io/yannh/kubeconform:latest -strict -summary - < /tmp/rendered.yaml
