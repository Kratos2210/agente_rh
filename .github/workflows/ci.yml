name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias (pyproject + extra dev)
        run: uv sync --extra dev
      - name: Tests del backend (suite completa)
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit

  docker:
    # Valida que las imágenes construyan (sin publicarlas). La publicación a GHCR
    # ocurre en `publish-image`, solo en merge a main.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build imagen backend
        run: docker build -f Dockerfile.backend -t agente-rh-backend:ci .
      - name: Build imagen frontend
        run: docker build -f frontend/Dockerfile -t agente-rh-frontend:ci .

  k8s-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar overlays dev y prod (kubeconform)
        run: |
          for env in dev prod; do
            echo "== overlay $env =="
            kubectl kustomize "despliegue/k8s/overlays/$env/" > "/tmp/rendered-$env.yaml"
            docker run --rm -i ghcr.io/yannh/kubeconform:latest -strict -summary - < "/tmp/rendered-$env.yaml"
          done

  prompt-version-gate:
    # Cambiar agente/prompts.py exige subir PROMPT_VERSION (y correr la suite golden).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verificar bump de PROMPT_VERSION si cambian los prompts
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "Sin base comparable (primer push o force-push); gate omitido."
            exit 0
          fi
          if git diff --quiet "$BASE" HEAD -- agente/prompts.py; then
            echo "agente/prompts.py sin cambios; OK."
            exit 0
          fi
          OLD=$(git show "$BASE:agente/prompts.py" 2>/dev/null | grep -E '^PROMPT_VERSION' || true)
          NEW=$(grep -E '^PROMPT_VERSION' agente/prompts.py || true)
          if [ "$OLD" = "$NEW" ]; then
            echo "::error file=agente/prompts.py::agente/prompts.py cambió pero PROMPT_VERSION no. Sube la versión y corre scripts/golden_eval.py."
            exit 1
          fi
          echo "PROMPT_VERSION actualizado: ${OLD:-<nuevo>} -> $NEW"

  publish-image:
    # Entrega Continua (CD): publica las imágenes a GHCR SOLO en merge a main,
    # tras pasar el resto del CI. Cada merge deja un artefacto desplegable, versionado
    # e inmutable (tag sha-<commit>) + `latest`. Desplegar sigue siendo manual y humano
    # (deploy.sh) — esto es Entrega Continua, no Despliegue Continuo. Usa GITHUB_TOKEN
    # (sin secretos extra).
    needs: [backend, frontend, docker, k8s-manifests, prompt-version-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Preparar nombres (owner en minúsculas, requerido por GHCR) y tag
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "backend=ghcr.io/$OWNER/agente-rh-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/$OWNER/agente-rh-frontend" >> "$GITHUB_OUTPUT"
          echo "tag=sha-$(echo "${{ github.sha }}" | cut -c1-12)" >> "$GITHUB_OUTPUT"
      - name: Login en GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build y push backend (sha + latest)
        run: |
          IMG="${{ steps.meta.outputs.backend }}"; TAG="${{ steps.meta.outputs.tag }}"
          docker build -f Dockerfile.backend -t "$IMG:$TAG" -t "$IMG:latest" .
          docker push "$IMG:$TAG"
          docker push "$IMG:latest"
      - name: Build y push frontend (sha + latest)
        run: |
          IMG="${{ steps.meta.outputs.frontend }}"; TAG="${{ steps.meta.outputs.tag }}"
          docker build -f frontend/Dockerfile -t "$IMG:$TAG" -t "$IMG:latest" .
          docker push "$IMG:$TAG"
          docker push "$IMG:latest"
      - name: Resumen del artefacto publicado
        run: |
          {
            echo "### 🐳 Imágenes publicadas (Entrega Continua)"
            echo "- \`${{ steps.meta.outputs.backend }}:${{ steps.meta.outputs.tag }}\` (+ \`:latest\`)"
            echo "- \`${{ steps.meta.outputs.frontend }}:${{ steps.meta.outputs.tag }}\` (+ \`:latest\`)"
            echo ""
            echo "El overlay \`prod\` ya apunta a estas imágenes. Para fijar este build inmutable antes de desplegar:"
            echo '```'
            echo "cd despliegue/k8s/overlays/prod && kustomize edit set image \\"
            echo "  agente-rh-backend=${{ steps.meta.outputs.backend }}:${{ steps.meta.outputs.tag }} \\"
            echo "  agente-rh-frontend=${{ steps.meta.outputs.frontend }}:${{ steps.meta.outputs.tag }}"
            echo "despliegue/deploy.sh k8s-apply prod   # requiere un cluster real"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
