name: CI

# Requiere que ESTE proyecto sea su propio repo git con remoto en GitHub.
# (Hoy los archivos viven sin trackear dentro del repo de HOME — ver CLAUDE.md.
#  Para que el CI corra: `git init` en agente_pro/ + remoto propio.)
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
      - name: Crear entorno e instalar dependencias
        run: |
          uv venv
          uv pip install -r requirements.txt
      - name: Tests del backend
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests
        run: npm test
