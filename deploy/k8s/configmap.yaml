# Configuración NO sensible del backend. Los secretos van en secret.yaml
# (ver secret.example.yaml). pydantic-settings lee estas variables de entorno
# directamente (no hace falta un .env dentro del contenedor).
apiVersion: v1
kind: ConfigMap
metadata:
  name: agente-rh-config
  namespace: agente-rh
data:
  APP_ENV: "production"
  # LLM compatible-OpenAI (Groq por defecto; la key va en el Secret).
  OPENAI_BASE_URL: "https://api.groq.com/openai/v1"
  OPENAI_MODEL: "qwen/qwen3-32b"
  # Supabase cloud del proyecto (la service key va en el Secret).
  SUPABASE_URL: "https://REEMPLAZAR.supabase.co"
  # Observabilidad (config-gated; encender según necesidad).
  LOG_JSON: "true"
  LLM_TRACE_ENABLED: "false"
  MCP_ENABLED: "false"
  # RAG en la entrevista (índice Chroma en el volumen del pod).
  INTERVIEW_RAG_ENABLED: "true"
  PERSIST_DIRECTORY: "/app/chroma_db"
  # CORS del dashboard (el Ingress sirve todo bajo el mismo host).
  CORS_ORIGINS: "https://REEMPLAZAR.midominio.com"
