apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Overlay de PRODUCCIÓN. ENVIRONMENT=production ⇒ api.auth.assert_secure_config
# BLOQUEA el arranque si JWT_SECRET/JWT_SECRET_PREVIOUS son débiles/default o
# ADMIN_PASSWORD tiene <12 chars. Fija el tag de imagen versionado y el dominio real.
namespace: agente-rh-prod
resources:
  - namespace.yaml
  - ../../base
images:
  # En prod se despliega un tag INMUTABLE y versionado (no `latest`): el CD publica
  # `ghcr.io/<owner>/agente-rh-*:sha-<commit>`. El `newTag` de abajo es un placeholder;
  # deploy.sh lo sobreescribe con el sha real (`kustomize edit set image ...:<tag>`).
  - name: agente-rh-backend
    newName: ghcr.io/kratos2210/agente-rh-backend
    newTag: latest
  - name: agente-rh-frontend
    newName: ghcr.io/kratos2210/agente-rh-frontend
    newTag: latest
patches:
  - path: configmap-patch.yaml
  - path: ingress-host-patch.yaml
  # Webhook (paso 3) ⇒ backend escala a replicas>1 + RollingUpdate (seguro sin polling).
  - path: backend-scale-patch.yaml
