# PLANTILLA de secretos — copiá a secret.yaml, completá y NUNCA commitees el real.
# SIN namespace fijo: se inyecta al aplicar según el entorno, para reusar la misma
# plantilla en dev y prod (los namespaces son agente-rh-dev / agente-rh-prod):
#   cp secret.example.yaml secret.yaml            # completar valores
#   kubectl apply -f secret.yaml -n agente-rh-prod
# (o `deploy/deploy.sh k8s-apply prod`, que lo aplica al namespace del overlay).
# En producción real: preferir un secret manager (External Secrets, Vault, Doppler)
# — ver docs/gestion_secretos.md para el inventario y los procedimientos de rotación.
# En prod, JWT_SECRET/ADMIN_PASSWORD débiles hacen que el backend se NIEGUE a arrancar
# (ENVIRONMENT=production ⇒ assert_secure_config): usá valores fuertes de verdad.
apiVersion: v1
kind: Secret
metadata:
  name: agente-rh-secrets
type: Opaque
stringData:
  OPENAI_API_KEY: "gsk_..."
  SUPABASE_SERVICE_KEY: "eyJ..."
  DATABASE_URL: "postgresql://postgres:PASSWORD@db.REEMPLAZAR.supabase.co:5432/postgres"
  TELEGRAM_BOT_TOKEN: "123456:ABC..."
  JWT_SECRET: "CAMBIAR-a-64-chars-aleatorios"
  ADMIN_EMAIL: "admin@empresa.com"
  ADMIN_PASSWORD: "CAMBIAR-minimo-12-chars"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_USER: "notificaciones@empresa.com"
  SMTP_PASSWORD: "app-password"
  RECRUITER_EMAIL: "rrhh@empresa.com"
