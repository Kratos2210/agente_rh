# ── Migración a secret manager (roadmap v2 · paso 4) ──────────────────────────────
#
# Plantilla de External Secrets Operator (ESO). Reemplaza el `secret.yaml` plano
# (deploy/k8s/secret.example.yaml): en vez de guardar los secretos en un objeto Secret
# versionado a mano, ESO los SINCRONIZA desde un gestor externo (Doppler / Vault /
# AWS / GCP / Supabase Vault) y materializa el MISMO Secret `agente-rh-secrets` que ya
# consumen los deployments (`envFrom.secretRef`). Rotás en el gestor → ESO re-sincroniza
# (refreshInterval) → sin editar YAML ni tocar el cluster a mano.
#
# NO está cableado a kustomize a propósito: son CRDs de ESO (SecretStore/ExternalSecret)
# que kubeconform no valida en el CI, y el operador se instala aparte. Es un artefacto
# "rellená y aplicá" cuando elijas proveedor. Ver README.md de esta carpeta.
#
# Requisito previo: instalar el operador una vez por cluster
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Ejemplo concreto: Doppler (el más simple). Para Vault/AWS/GCP, cambiá SOLO el bloque
# `provider` del SecretStore (ver README) — el ExternalSecret queda igual.
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: agente-rh-store
  namespace: agente-rh-prod # aplicá en el namespace del entorno (dev usa secret.yaml plano)
spec:
  provider:
    # ── Doppler ──────────────────────────────────────────────────────────────────
    doppler:
      auth:
        secretRef:
          # Token de servicio de Doppler (dp.st.xxx), en un Secret k8s mínimo creado a mano:
          #   kubectl -n agente-rh-prod create secret generic doppler-token \
          #     --from-literal=dopplerToken='dp.st.prod.xxxxx'
          dopplerToken:
            name: doppler-token
            key: dopplerToken
      # project/config se toman del token de servicio; se pueden fijar aquí si el token es amplio.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agente-rh-secrets
  namespace: agente-rh-prod
spec:
  refreshInterval: 1h # cada cuánto re-sincroniza desde el gestor (rotación sin redeploy)
  secretStoreRef:
    name: agente-rh-store
    kind: SecretStore
  target:
    name: agente-rh-secrets # MISMO nombre que consumen los deployments (backend/frontend)
    creationPolicy: Owner
  # Trae TODAS las claves del proyecto/config del gestor de una (sin drift por clave).
  # Las claves en el gestor deben llamarse igual que las env vars del backend:
  #   OPENAI_API_KEY, SUPABASE_SERVICE_KEY, DATABASE_URL, TELEGRAM_BOT_TOKEN,
  #   TELEGRAM_WEBHOOK_SECRET, JWT_SECRET, JWT_SECRET_PREVIOUS, ADMIN_EMAIL,
  #   ADMIN_PASSWORD, SMTP_HOST, SMTP_USER, SMTP_PASSWORD, RECRUITER_EMAIL, OPS_ALERT_EMAIL
  dataFrom:
    - extract:
        key: "" # Doppler: vacío = el config apuntado por el token; otros proveedores: ruta del secreto
