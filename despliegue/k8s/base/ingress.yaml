# Única entrada pública: /api/* al backend, el resto al frontend — el mismo patrón
# del Caddyfile de compose, en versión Ingress (nginx). TLS: agregar cert-manager
# o el anotado del proveedor cloud.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agente-rh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "25m" # PDFs del candidato (límite app: 20 MB)
spec:
  ingressClassName: nginx
  rules:
    - host: agente-rh.REEMPLAZAR.midominio.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          # Webhook de Telegram (paso 3): Telegram hace POST aquí cuando el bot corre en
          # modo webhook (TELEGRAM_WEBHOOK_URL configurado). En polling esta ruta es 404.
          - path: /telegram/webhook
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
