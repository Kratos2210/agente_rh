apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Base COMÚN. No se aplica directamente: cada entorno tiene su overlay en
# ../overlays/{dev,prod} que fija namespace, ENVIRONMENT, dominio, réplicas y tags
# de imagen. Ver ../README.md.
resources:
  # El objeto Namespace lo declara cada overlay (con su nombre agente-rh-dev/-prod):
  # el transformer `namespace:` reubica los recursos pero NO renombra un Namespace.
  - configmap.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml
# secret.yaml NO va acá: se aplica aparte desde la copia local de
# secret.example.yaml (o lo inyecta un secret manager). Ver ../README.md.
