apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: agente-rh
    app.kubernetes.io/component: frontend
spec:
  # El dashboard es stateless: escala horizontal sin restricciones.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agente-rh
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agente-rh
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: agente-rh-frontend:latest # reemplazar por el registry real
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # El rewrite /api/* se hornea en build; en K8s el Ingress rutea /api
            # directo al backend, así que este valor solo cubre llamadas server-side.
            - name: BACKEND_URL
              value: "http://backend:8000"
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /login
              port: 3000
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              memory: "512Mi"
