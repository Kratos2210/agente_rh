# Recursos reducidos para dev (un cluster de pruebas suele tener menos capacidad).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
