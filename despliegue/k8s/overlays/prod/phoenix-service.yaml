apiVersion: v1
kind: Service
metadata:
  name: phoenix
  labels:
    app.kubernetes.io/name: agente-rh
    app.kubernetes.io/component: phoenix
spec:
  # ClusterIP: solo el backend lo alcanza (envía spans a http://phoenix:6006/v1/traces).
  # La UI se ve con `kubectl port-forward svc/phoenix 6006:6006`, no se expone al Ingress.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agente-rh
    app.kubernetes.io/component: phoenix
  ports:
    - name: http
      port: 6006
      targetPort: 6006
