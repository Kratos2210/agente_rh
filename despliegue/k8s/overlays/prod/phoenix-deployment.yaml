apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  labels:
    app.kubernetes.io/name: agente-rh
    app.kubernetes.io/component: phoenix
spec:
  # Un solo pod: el collector recibe spans OTLP y sirve la UI. Traza EFÍMERA
  # (in-memory) — suficiente para inspección operativa; para retención durable se
  # configura PHOENIX_SQL_DATABASE_URL contra un Postgres. La PII no sale del
  # cluster (self-hosted): cumple Ley 29733. Ver docs/despliegue.md.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: agente-rh
      app.kubernetes.io/component: phoenix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agente-rh
        app.kubernetes.io/component: phoenix
    spec:
      containers:
        - name: phoenix
          image: arizephoenix/phoenix:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6006
          readinessProbe:
            httpGet:
              path: /
              port: 6006
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 6006
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
